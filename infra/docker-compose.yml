version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: byline-postgres
    environment:
      POSTGRES_USER: byline
      POSTGRES_PASSWORD: byline
      POSTGRES_DB: byline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./postgres/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U byline"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: byline-redis
    ports:
      - "6379:6379"
    # Redis is not needed until Phase 2 (voice notes, GitHub webhooks).
    # It's included here so the compose file doesn't need to change.
    profiles:
      - phase2

volumes:
  postgres_data:
