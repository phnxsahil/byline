<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1F1D1B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0E0D0B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8593C;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#E8593C;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- App icon background -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#bg)"/>

  <!-- Orange glow -->
  <rect width="512" height="512" rx="115" ry="115" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect width="510" height="510" x="1" y="1" rx="114" ry="114" fill="none"
        stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- "b" letter — warm white -->
  <text x="98" y="348"
        font-family="'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif"
        font-size="260" font-weight="700"
        fill="#F0EDE8"
        letter-spacing="-12">b</text>

  <!-- "_" cursor — orange -->
  <text x="268" y="348"
        font-family="'SF Pro Display', 'Helvetica Neue', system-ui, sans-serif"
        font-size="260" font-weight="700"
        fill="#E8593C"
        letter-spacing="-12">_</text>
</svg>
